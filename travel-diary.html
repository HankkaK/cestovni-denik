<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cestovní deník</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deník">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --rust: #b85c38;
    --gold: #c9a84c;
    --faded: #8a7e6e;
    --green: #3d6b4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,125,100,0.15) 27px, rgba(139,125,100,0.15) 28px);
    background-size: 100% 28px;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 24px 20px 60px; }

  header { text-align: center; margin-bottom: 28px; padding-top: 16px; }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-style: italic;
    color: var(--ink); letter-spacing: 0.02em; line-height: 1.2;
  }
  .subtitle { font-size: 10px; color: var(--faded); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 12px 0; color: var(--gold); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }

  .status-bar {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--aged);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 24px;
    font-size: 11px;
    color: var(--faded);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faded); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  .status-dot.ok { background: var(--green); }
  .status-dot.error { background: var(--rust); }

  .recorder-area { text-align: center; margin: 28px 0; }

  .record-btn {
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid var(--rust); background: white; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.25s; box-shadow: 0 4px 20px rgba(184,92,56,0.2);
  }
  .record-btn:hover { box-shadow: 0 6px 28px rgba(184,92,56,0.35); transform: scale(1.04); }
  .record-btn.recording { background: var(--rust); border-color: var(--rust); animation: pulse 1.4s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,92,56,0.5); }
    50% { box-shadow: 0 0 0 16px rgba(184,92,56,0); }
  }

  .mic-icon { width: 32px; height: 32px; fill: var(--rust); transition: fill 0.25s; }
  .record-btn.recording .mic-icon { fill: white; }

  .record-label { display: block; margin-top: 12px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--faded); }

  .live-transcript {
    min-height: 70px; background: rgba(255,255,255,0.6);
    border: 1px dashed var(--aged); border-radius: 4px;
    padding: 12px 14px; font-family: 'Playfair Display', serif;
    font-size: 14px; line-height: 1.6; color: var(--ink); font-style: italic;
    margin: 16px 0; transition: border-color 0.3s;
  }
  .live-transcript.active { border-color: var(--rust); border-style: solid; }
  .live-transcript .placeholder { color: var(--faded); font-size: 12px; font-style: normal; font-family: 'DM Mono', monospace; }

  .btn-save {
    width: 100%; background: var(--ink); color: var(--paper); border: none;
    border-radius: 4px; padding: 13px; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
  }
  .btn-save:hover { background: #2d2620; }
  .btn-save:active { transform: scale(0.99); }
  .btn-save:disabled { background: var(--faded); cursor: default; }

  .entries-header { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faded); margin: 28px 0 12px; display: flex; align-items: center; gap: 10px; }
  .entries-header::after { content: ''; flex: 1; height: 1px; background: var(--aged); }

  .entry-card {
    background: rgba(255,255,255,0.55); border-left: 3px solid var(--gold);
    padding: 12px 14px; margin-bottom: 10px; border-radius: 0 4px 4px 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

  .entry-meta { font-size: 10px; color: var(--faded); margin-bottom: 6px; letter-spacing: 0.08em; }
  .entry-text { font-family: 'Playfair Display', serif; font-size: 14px; line-height: 1.65; color: var(--ink); }
  .entry-synced { font-size: 10px; color: var(--green); margin-top: 6px; }
  .entry-error { font-size: 10px; color: var(--rust); margin-top: 6px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper); padding: 10px 20px;
    border-radius: 4px; font-size: 12px; letter-spacing: 0.08em;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title">Cestovní deník</div>
    <div class="subtitle">Hlasové záznamy · Google Docs</div>
    <div class="divider">✦</div>
  </header>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Připojuji…</span>
  </div>

  <div class="recorder-area">
    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
      <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 7a1 1 0 0 1 1 1 8 8 0 0 1-7 7.938V21h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.062A8 8 0 0 1 4 11a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
      </svg>
    </button>
    <span class="record-label" id="recordLabel">Klepni pro nahrávání</span>
  </div>

  <div class="live-transcript" id="liveTranscript">
    <span class="placeholder">Přepis se zobrazí zde…</span>
  </div>

  <button class="btn-save" id="btnSave" onclick="saveEntry()" disabled>
    Uložit záznam do Google Docs
  </button>

  <div class="entries-header">Dnešní záznamy</div>
  <div id="entriesList"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// GLOBÁLNÍ PROMĚNNÉ
// Tyto proměnné jsou dostupné v celém skriptu po celou dobu běhu
// ═══════════════════════════════════════════════════════════════

// URL Google Apps Scriptu, který zapisuje do Google Docs
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw92OtT2AmDn9Es3MEQnO5HOyhvXr4phMcBU7o0ZzxCdrCWeUpGgsIgWkF2A6UXnc49ow/exec';

// Objekt pro práci s rozpoznáváním řeči (null = zatím nevytvořen)
let recognition = null;

// Příznak: právě teď nahráváme? true/false
let isRecording = false;

// Hotový (finální) přepis – slova která Speech API už potvrdilo jako správná
let finalTranscript = '';

// Průběžný přepis – slova která Speech API ještě zpracovává (mohou se změnit)
let interimTranscript = '';

// Index posledního zpracovaného výsledku – zabraňuje zdvojování slov při restartu
let lastResultIndex = 0;

// Záznamy uložené lokálně v telefonu (záloha kdyby nefungoval internet)
// localStorage je úložiště přímo v prohlížeči, přežije zavření appky
let entries = JSON.parse(localStorage.getItem('diaryEntries') || '[]');


// ═══════════════════════════════════════════════════════════════
// INICIALIZACE – spustí se automaticky po načtení stránky
// ═══════════════════════════════════════════════════════════════
window.onload = () => {
  renderEntries();                            // zobraz uložené záznamy
  checkSpeechSupport();                       // zkontroluj jestli prohlížeč umí nahrávat
  setStatus(true, 'Připojeno k Google Docs ✓'); // nastav zelený status
};


// ═══════════════════════════════════════════════════════════════
// KONTROLA PODPORY MIKROFONU
// Některé prohlížeče (starší, nebo Firefox) neumí Web Speech API
// ═══════════════════════════════════════════════════════════════
function checkSpeechSupport() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    // Prohlížeč nepodporuje nahrávání – vizuálně deaktivujeme tlačítko
    document.getElementById('recordBtn').style.opacity = '0.4';
    document.getElementById('recordLabel').textContent = 'Prohlížeč nepodporuje nahrávání';
    showToast('Použij Chrome nebo Samsung Internet');
  }
}


// ═══════════════════════════════════════════════════════════════
// STATUS BAR – zelená/červená tečka s popisem stavu
// ═══════════════════════════════════════════════════════════════
function setStatus(ok, text) {
  // ok=true → zelená tečka, ok=false → červená tečka
  document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'error');
  document.getElementById('statusText').textContent = text;
}


// ═══════════════════════════════════════════════════════════════
// PŘEPÍNAČ NAHRÁVÁNÍ – reaguje na klepnutí na mikrofon
// ═══════════════════════════════════════════════════════════════
function toggleRecording() {
  // Pokud nahráváme → zastav, pokud ne → začni
  isRecording ? stopRecording() : startRecording();
}


// ═══════════════════════════════════════════════════════════════
// SPUŠTĚNÍ NAHRÁVÁNÍ
// Vytvoří objekt SpeechRecognition a nastaví jeho chování
// ═══════════════════════════════════════════════════════════════
function startRecording() {
  // Načteme SpeechRecognition – různé prohlížeče ho mají pod různým názvem
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return; // prohlížeč nepodporuje → konec

  // Resetujeme všechny přepisy před novým nahráváním
  finalTranscript = '';
  interimTranscript = '';
  lastResultIndex = 0;

  // Vytvoříme nový objekt pro rozpoznávání řeči
  recognition = new SpeechRecognition();
  recognition.lang = 'cs-CZ';          // jazyk: čeština
  recognition.continuous = true;        // nahrávej nepřetržitě, nezastavuj po větě
  recognition.interimResults = true;    // ukazuj průběžné výsledky (ještě nepotvrzená slova)
  recognition.maxAlternatives = 1;      // chceme jen jeden nejlepší přepis, ne více variant

  // ── Callback: přišly nové výsledky přepisu ──
  recognition.onresult = (e) => {
    interimTranscript = ''; // vždy resetujeme průběžný přepis

    // Procházíme pouze nové výsledky (od posledního zpracovaného indexu)
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        // Finální výsledek – Speech API ho potvrdilo jako správný
        // Kontrola indexu zabraňuje zdvojení slov při restartu recognition
        if (i >= lastResultIndex) {
          finalTranscript += e.results[i][0].transcript + ' ';
          lastResultIndex = i + 1; // posuneme ukazatel
        }
      } else {
        // Průběžný výsledek – ještě se může změnit, zobrazíme kurzívou
        interimTranscript += e.results[i][0].transcript;
      }
    }
    updateTranscriptDisplay(); // aktualizuj co uživatel vidí na obrazovce
  };

  // ── Callback: nastala chyba ──
  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return; // ticho není chyba, jen ignorujeme
    showToast('Chyba: ' + e.error);
    stopRecording();
  };

  // ── Callback: recognition se zastavil (po pauze to dělá automaticky) ──
  recognition.onend = () => {
    // Pokud uživatel ještě nestiskl Stop, restartujeme nahrávání
    // lastResultIndex NEresetujeme – díky tomu se slova nezdvojují
    if (isRecording) recognition.start();
  };

  // Spustíme nahrávání a aktualizujeme UI
  recognition.start();
  isRecording = true;
  document.getElementById('recordBtn').classList.add('recording');   // červené tlačítko + animace
  document.getElementById('recordLabel').textContent = 'Nahrávám… klepni pro stop';
  document.getElementById('liveTranscript').classList.add('active'); // červený rámeček
}


// ═══════════════════════════════════════════════════════════════
// ZASTAVENÍ NAHRÁVÁNÍ
// ═══════════════════════════════════════════════════════════════
function stopRecording() {
  // Nejdřív nastavíme příznak na false – jinak by onend znovu spustil nahrávání
  isRecording = false;
  if (recognition) { recognition.stop(); recognition = null; }

  // Vrátíme UI do výchozího stavu
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordLabel').textContent = 'Klepni pro nahrávání';
  document.getElementById('liveTranscript').classList.remove('active');

  // Pokud máme nějaký text, aktivujeme tlačítko Uložit
  if (finalTranscript.trim()) {
    document.getElementById('btnSave').disabled = false;
  }
}


// ═══════════════════════════════════════════════════════════════
// AKTUALIZACE ZOBRAZENÍ PŘEPISU
// Finální text je normální, průběžný text je kurzívou a šedý
// ═══════════════════════════════════════════════════════════════
function updateTranscriptDisplay() {
  const el = document.getElementById('liveTranscript');
  const combined = finalTranscript + (interimTranscript
    ? '<em style="color:var(--faded)">' + interimTranscript + '</em>'
    : '');
  el.innerHTML = combined || '<span class="placeholder">Přepis se zobrazí zde…</span>';
}


// ═══════════════════════════════════════════════════════════════
// ULOŽENÍ ZÁZNAMU DO GOOGLE DOCS
// Sestaví text s datem a pošle ho do Google Apps Scriptu
// ═══════════════════════════════════════════════════════════════
async function saveEntry() {
  const text = finalTranscript.trim();
  if (!text) return; // nic k uložení

  // Deaktivujeme tlačítko aby nešlo kliknout dvakrát
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Ukládám…';

  // Sestavíme datum a čas v českém formátu
  const now = new Date();
  const dateStr = now.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });
  const timeStr = now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

  // Výsledný text záznamu – datum na prvním řádku, přepis na druhém
  // Příklad: "\n[sobota 31. května, 10:06]\nDnes jsme byli v Římě...\n"
  const entryText = '\n[' + dateStr + ', ' + timeStr + ']\n' + text + '\n';

  // Objekt záznamu pro lokální uložení v telefonu
  const entry = { date: now.toISOString(), text, synced: false, id: Date.now() };

  try {
    // Pošleme POST požadavek na Google Apps Script
    // fetch = funkce pro komunikaci se serverem přes internet
    // Použijeme no-cors mode přes formulářová data – obchází CORS omezení prohlížeče
    // Apps Script přijme data a zapíše je, i když nevrátí čitelnou odpověď
    const formData = new FormData();
    formData.append('entry', entryText);

    await fetch(SCRIPT_URL, {
      method: 'POST',                // typ požadavku: posíláme data
      body: formData                 // formulářová data – nevyžadují CORS preflight
    });

    // S no-cors nemůžeme číst odpověď, ale pokud fetch nehodil chybu, zápis proběhl
    const result = { ok: true };

    if (result.ok) {
      // Úspěch – označíme záznam jako synchronizovaný
      entry.synced = true;
      showToast('Uloženo do Google Docs ✓');
      setStatus(true, 'Naposledy uloženo ' + timeStr);
    } else {
      throw new Error(result.error || 'Neznámá chyba');
    }
  } catch (err) {
    // Něco se pokazilo (chyba internetu, CORS, chyba skriptu...)
    entry.error = err.message;
    showToast('Chyba – uloženo lokálně');
    setStatus(false, 'Problém s připojením: ' + err.message);
  }

  // Uložíme záznam lokálně v telefonu jako zálohu (max 50 záznamů)
  entries.unshift(entry); // přidáme na začátek seznamu
  localStorage.setItem('diaryEntries', JSON.stringify(entries.slice(0, 50)));
  renderEntries(); // aktualizujeme seznam na obrazovce

  // Resetujeme přepis pro další nahrávání
  finalTranscript = '';
  interimTranscript = '';
  lastResultIndex = 0;
  document.getElementById('liveTranscript').innerHTML = '<span class="placeholder">Přepis se zobrazí zde…</span>';
  btn.textContent = 'Uložit záznam do Google Docs';
}


// ═══════════════════════════════════════════════════════════════
// ZOBRAZENÍ SEZNAMU ZÁZNAMŮ
// Vykreslí posledních 10 záznamů pod tlačítkem Uložit
// ═══════════════════════════════════════════════════════════════
function renderEntries() {
  const list = document.getElementById('entriesList');

  if (!entries.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--faded);text-align:center;padding:12px 0;">Žádné záznamy zatím</div>';
    return;
  }

  // Projdeme posledních 10 záznamů a vytvoříme HTML kartu pro každý
  list.innerHTML = entries.slice(0, 10).map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short' });
    const timeStr = d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
    return '<div class="entry-card">' +
      '<div class="entry-meta">' + dateStr + ' · ' + timeStr + '</div>' +
      '<div class="entry-text">' + e.text + '</div>' +
      (e.synced ? '<div class="entry-synced">↑ synchronizováno</div>' : '') +
      (e.error ? '<div class="entry-error">⚠ ' + e.error + '</div>' : '') +
      '</div>';
  }).join('');
}


// ═══════════════════════════════════════════════════════════════
// TOAST NOTIFIKACE
// Krátká zpráva která se zobrazí dole na obrazovce a zmizí
// ═══════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');                          // animace – vyskočí zdola
  setTimeout(() => t.classList.remove('show'), 2800); // po 2.8 sekundách zmizí
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// SERVICE WORKER REGISTRACE
// Service worker je skript běžící na pozadí – zajišťuje offline režim
// Zaregistruje se jednou a pak funguje automaticky
// ═══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
}
</script>
</body>
</html>
